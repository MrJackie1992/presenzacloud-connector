name: Build Connector Installer

on:
  workflow_dispatch:
    inputs:
      token:
        description: "Activation token (will be embedded in installer)"
        required: true
      company_name:
        description: "Company name (for installer label)"
        required: true
      consultant_email:
        description: "Consultant email to notify when done"
        required: true
      callback_url:
        description: "Backend webhook URL to call when build completes"
        required: true
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      ACTIVATION_TOKEN: ${{ github.event.inputs.token }}
      COMPANY_NAME: ${{ github.event.inputs.company_name }}
      CONSULTANT_EMAIL: ${{ github.event.inputs.consultant_email }}
      CALLBACK_URL: ${{ github.event.inputs.callback_url }}

    steps:
      - name: Debug inputs
        shell: pwsh
        run: |
          Write-Host "=== INPUTS ==="
          Write-Host "token input: '${{ github.event.inputs.token }}'"
          Write-Host "company_name: '${{ github.event.inputs.company_name }}'"
          Write-Host "=== ENV ==="
          Write-Host "ACTIVATION_TOKEN: '$env:ACTIVATION_TOKEN'"
          Write-Host "COMPANY_NAME: '$env:COMPANY_NAME'"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install pkg
        run: npm install -g pkg

      - name: Build connector.exe
        run: pkg connector.js --target node18-win-x64 --output dist/connector.exe

      - name: Build setup-wizard.exe
        run: pkg setup-wizard.js --target node18-win-x64 --output dist/setup-wizard.exe

      - name: Download and install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile inno-setup.exe
          Start-Process -FilePath "inno-setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Host "Inno Setup installed"

      - name: Inject token into installer script
        shell: pwsh
        run: |
          $token = $env:ACTIVATION_TOKEN
          Write-Host "Injecting token (length: $($token.Length))"
          $content = Get-Content installer.iss -Raw
          $content = $content -replace '#define PresetToken ""', "#define PresetToken `"$token`""
          $content | Set-Content installer_build.iss -Encoding UTF8

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_build.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Rename and set output paths
        shell: pwsh
        run: |
          $token = $env:ACTIVATION_TOKEN
          $short = $token.Substring(0, [Math]::Min(16, $token.Length))
          $generated = Get-ChildItem dist\ -Filter "PresenzaCloud-Connector-Setup.exe" | Select-Object -First 1
          if (-not $generated) { throw "Nessun installer trovato in dist/" }
          $newName = "PresenzaCloud-Connector-Setup-$short.exe"
          Rename-Item -Path $generated.FullName -NewName $newName
          Write-Host "Renamed to: $newName"
          echo "INSTALLER_NAME=$newName" >> $env:GITHUB_ENV
          echo "INSTALLER_PATH=dist\$newName" >> $env:GITHUB_ENV

      - name: Create Release and upload installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $token      = $env:ACTIVATION_TOKEN
          $company    = $env:COMPANY_NAME
          $repo       = "${{ github.repository }}"
          $tagName    = "connector-$token"
          $installerPath = $env:INSTALLER_PATH
          $installerName = $env:INSTALLER_NAME

          Write-Host "Tag: $tagName"
          Write-Host "File: $installerPath"

          $headers = @{
            "Authorization"        = "Bearer $env:GH_TOKEN"
            "Accept"               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          # Elimina release/tag esistenti con lo stesso nome (da run precedenti falliti)
          try {
            $existing = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$repo/releases/tags/$tagName" `
              -Headers $headers -Method GET
            Write-Host "Deleting existing release $($existing.id)..."
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($existing.id)" `
              -Headers $headers -Method DELETE
          } catch { Write-Host "No existing release to delete" }

          try {
            Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$repo/git/refs/tags/$tagName" `
              -Headers $headers -Method DELETE
            Write-Host "Deleted existing tag"
          } catch { Write-Host "No existing tag to delete" }

          # Crea la release
          $releaseBody = @{
            tag_name         = $tagName
            target_commitish = "main"
            name             = "Connector - $company"
            body             = "Installer generato per: $company"
            draft            = $false
            prerelease       = $false
          } | ConvertTo-Json -Compress

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$repo/releases" `
            -Method POST -Headers $headers `
            -Body $releaseBody -ContentType "application/json"

          Write-Host "Release created: $($release.id)"

          # Carica il file
          $uploadUrl = "https://uploads.github.com/repos/$repo/releases/$($release.id)/assets?name=$installerName"
          $fileBytes = [System.IO.File]::ReadAllBytes((Resolve-Path $installerPath))
          Invoke-RestMethod -Uri $uploadUrl -Method POST -Headers $headers `
            -Body $fileBytes -ContentType "application/octet-stream" | Out-Null

          Write-Host "Asset uploaded"

          $downloadUrl = "https://github.com/$repo/releases/download/$tagName/$installerName"
          echo "DOWNLOAD_URL=$downloadUrl" >> $env:GITHUB_ENV
          Write-Host "Download URL: $downloadUrl"

      - name: Notify backend via webhook
        shell: pwsh
        run: |
          $body = @{
            token           = $env:ACTIVATION_TOKEN
            consultantEmail = $env:CONSULTANT_EMAIL
            companyName     = $env:COMPANY_NAME
            downloadUrl     = $env:DOWNLOAD_URL
            secret          = "${{ secrets.CALLBACK_SECRET }}"
          } | ConvertTo-Json -Compress

          try {
            Invoke-RestMethod -Uri $env:CALLBACK_URL -Method POST `
              -ContentType "application/json" -Body $body
            Write-Host "Webhook notified successfully"
          } catch {
            Write-Host "Webhook failed (non-blocking): $_"
          }
