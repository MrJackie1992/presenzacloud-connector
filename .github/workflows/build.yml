name: Build Connector Installer

on:
  workflow_dispatch:
    inputs:
      token:
        description: "Activation token (will be embedded in installer)"
        required: true
      company_name:
        description: "Company name (for installer label)"
        required: true
      consultant_email:
        description: "Consultant email to notify when done"
        required: true
      callback_url:
        description: "Backend webhook URL to call when build completes"
        required: true
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    env:
      ACTIVATION_TOKEN: ${{ github.event.inputs.token }}
      COMPANY_NAME: ${{ github.event.inputs.company_name }}
      CONSULTANT_EMAIL: ${{ github.event.inputs.consultant_email }}
      CALLBACK_URL: ${{ github.event.inputs.callback_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install pkg
        run: npm install -g pkg

      - name: Build connector.exe
        run: pkg connector.js --target node18-win-x64 --output dist/connector.exe

      - name: Build setup-wizard.exe
        run: pkg setup-wizard.js --target node18-win-x64 --output dist/setup-wizard.exe

      - name: Download and install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile inno-setup.exe
          Start-Process -FilePath "inno-setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Host "Inno Setup installed"

      - name: Inject token into installer script
        shell: pwsh
        run: |
          $token = $env:ACTIVATION_TOKEN
          Write-Host "Token length: $($token.Length)"
          $content = Get-Content installer.iss -Raw
          $content = $content -replace '#define PresetToken ""', "#define PresetToken `"$token`""
          $content | Set-Content installer_build.iss -Encoding UTF8
          Write-Host "installer_build.iss created"

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_build.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Rename and set output paths
        shell: pwsh
        run: |
          $token = $env:ACTIVATION_TOKEN
          $short = $token.Substring(0, [Math]::Min(16, $token.Length))
          $src = "dist\PresenzaCloud-Connector-Setup.exe"
          $dst = "dist\PresenzaCloud-Connector-Setup-$short.exe"
          Rename-Item $src $dst
          echo "INSTALLER_NAME=PresenzaCloud-Connector-Setup-$short.exe" >> $env:GITHUB_ENV
          echo "INSTALLER_PATH=dist\PresenzaCloud-Connector-Setup-$short.exe" >> $env:GITHUB_ENV
          Write-Host "Installer: $dst"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "connector-${{ github.event.inputs.token }}"
          name: "Connector — ${{ github.event.inputs.company_name }}"
          body: |
            Installer generato per: **${{ github.event.inputs.company_name }}**

            ⚠️ Installer mono-uso pre-configurato per questa azienda.
          files: ${{ env.INSTALLER_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify backend via webhook
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $tag  = "connector-$env:ACTIVATION_TOKEN"
          $name = $env:INSTALLER_NAME
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$name"

          $body = @{
            token           = $env:ACTIVATION_TOKEN
            consultantEmail = $env:CONSULTANT_EMAIL
            companyName     = $env:COMPANY_NAME
            downloadUrl     = $downloadUrl
            secret          = "${{ secrets.CALLBACK_SECRET }}"
          } | ConvertTo-Json -Compress

          try {
            Invoke-RestMethod -Uri $env:CALLBACK_URL -Method POST -ContentType "application/json" -Body $body
            Write-Host "Webhook notified successfully"
          } catch {
            Write-Host "Webhook failed (non-blocking): $_"
          }
